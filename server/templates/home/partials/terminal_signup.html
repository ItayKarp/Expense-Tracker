<form id="signup-form" class="auth-form" action="">
    <div class="field-row">
        <span class="prompt">&gt; NAME_:</span>
        <input type="text" id="name" placeholder="your_name" autocomplete="off">
    </div>
    <div class="field-row">
        <span class="prompt">&gt; MAIL_:</span>
        <input type="email" id="email" placeholder="user@domain.com" autocomplete="off">
    </div>
    <div class="field-row">
        <span class="prompt">&gt; PASS_:</span>
        <input type="password" id="password" placeholder="••••••••">
    </div>
    <div class="status-line" id="signup-status"></div>
    <button type="submit" id="submit-signup" class="btn-submit">[ CREATE ]</button>
    <div class="toggle-row">
        <span>Have an account?</span>
        <button type="button" id="to-login" class="toggle-btn">SIGN_IN</button>
    </div>
</form>
