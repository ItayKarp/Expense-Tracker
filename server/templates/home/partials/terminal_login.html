<form id="login-form" class="auth-form active" action="">
    <div class="field-row">
        <span class="prompt">&gt; MAIL_:</span>
        <input type="email" id="login-email" placeholder="user@domain.com" autocomplete="off">
    </div>
    <div class="field-row">
        <span class="prompt">&gt; PASS_:</span>
        <input type="password" id="login-password" placeholder="••••••••">
    </div>
    <div class="status-line" id="login-status"></div>
    <button type="submit" id="submit-login" class="btn-submit">[ ENTER ]</button>
    <div class="toggle-row">
        <span>No account?</span>
        <button type="button" id="to-signup" class="toggle-btn">REGISTER_NOW</button>
    </div>
</form>
