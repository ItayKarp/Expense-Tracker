<div id="expenses-view" class="view">
    <div class="view-header">
        <div>
            <h1>Expenses</h1>
            <p class="subtitle">All transactions linked to your account.</p>
        </div>
        <div class="expenses-controls">
    <input type="text" id="expense-search" class="search-input" placeholder="Search expenses...">

    <button id="add-expense-btn" class="action-btn-main" onclick="openCreateExpenseModal()">
    <span class="refresh-icon">+</span> EXPENSE
</button>

    <button id="add-category-btn" onclick="openCategoryModal()" title="Add new spending category">
        <span class="refresh-icon">+</span>
        NEW CATEGORY
    </button>

    <button id="refresh-expenses-btn">
        <span class="refresh-icon">↻</span>
        REFRESH
    </button>
</div>
    </div>

    <div class="expenses-tabs">
        <button class="tab-btn active" data-tab="monthly">Last Month</button>
        <button class="tab-btn" data-tab="yearly">Last Year</button>
        <button class="tab-btn" data-tab="all">All Expenses</button>
    </div>

    <div id="expenses-status" class="expenses-status"></div>

    <div class="table-wrapper">
        <table class="expenses-table" id="expenses-table">
            <thead>
                <tr>
                    <th data-col="date" class="sortable sort-desc">Date <span class="sort-icon">↓</span></th>
                    <th data-col="description" class="sortable">Description <span class="sort-icon">↕</span></th>
                    <th data-col="category" class="sortable">Category <span class="sort-icon">↕</span></th>
                    <th data-col="amount" class="sortable">Amount <span class="sort-icon">↕</span></th>
                    <th>Status</th>
                    <th class="actions-th"></th>
                </tr>
            </thead>
            <tbody id="expenses-tbody">
                <tr class="table-empty-row">
                    <td colspan="6">Loading expenses...</td>
                </tr>
            </tbody>
        </table>
    </div>

    <div class="table-footer">
        <span id="expenses-count" class="expenses-count"></span>
        <span id="expenses-total" class="expenses-total"></span>
    </div>
</div>
